<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krul Song Repertoire</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

html{
  min-height:100%;
  background:#e8f7ff;
}

body{
  margin:0;
  min-height:100vh;
  padding:16px;
  background:#e8f7ff;
  font-family:"Zen Old Mincho", serif;
  color:#5f91d2;
}

.wrap{
  max-width:820px;
  margin:0 auto;
}

.frame{
  background:rgba(255,255,255,.80);
  border:1px solid #8fb8e8;
  outline:1px solid rgba(143,184,232,.45);
  outline-offset:4px;
}

.header{
  text-align:center;
  padding:20px 14px 18px;
  margin:12px 4px 22px;
}

h1{
  margin:0;
  font-size:27px;
  font-weight:700;
  letter-spacing:.04em;
}

.sub{
  margin-top:5px;
  font-size:14px;
  letter-spacing:.12em;
}

.count{
  margin-top:10px;
  font-size:13px;
  color:#7aa7dc;
  letter-spacing:.08em;
}

.message{
  margin-top:14px;
  line-height:1.7;
  font-size:13px;
}

.search-area{
  position:relative;
  margin:4px 0 12px;
}

.search{
  width:100%;
  padding:11px 42px 11px 13px;
  border:1px solid #9fc2ed;
  background:rgba(255,255,255,.70);
  color:#5f91d2;
  font-family:inherit;
  font-size:13px;
  border-radius:0;
}

.search::placeholder{
  color:#94b7e4;
}

.clear-btn{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  border:none;
  background:transparent;
  color:#8fb8e8;
  font-size:18px;
  font-family:"Zen Old Mincho", serif;
  line-height:1;
  cursor:pointer;
  padding:0 4px;
}

.random-btn{
  width:100%;
  border:1px solid #9fc2ed;
  background:rgba(255,255,255,.90);
  color:#5f91d2;
  padding:8px 5px;
  margin:0 0 16px;
  text-align:center;
  font-family:"Zen Old Mincho", serif;
  font-size:12px;
  cursor:pointer;
}

#todaySong{
  margin-bottom:16px;
}

.today-title{
  text-align:center;
  margin-bottom:10px;
  font-size:12px;
  color:#7aa7dc;
  letter-spacing:.08em;
}

.categories{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-bottom:12px;
}

.cat{
  border:1px solid #9fc2ed;
  background:rgba(255,255,255,.48);
  color:#5f91d2;
  padding:8px 5px;
  text-align:center;
  font-size:13px;
  cursor:pointer;
}

.cat.active{
  background:rgba(143,184,232,.22);
}

.tag-filters{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:20px;
}

.tag-filter{
  border:1px solid #9fc2ed;
  background:rgba(255,255,255,.55);
  color:#5f91d2;
  padding:6px 4px;
  text-align:center;
  font-size:11px;
  cursor:pointer;
}

.tag-filter.active{
  background:rgba(143,184,232,.22);
}

.song-card{
  position:relative;
  background:rgba(255,255,255,.80);
  border:1px solid #8fb8e8;
  outline:1px solid rgba(143,184,232,.35);
  outline-offset:3px;
  padding:9px 11px;
  margin:0 4px 12px;
}

.song-title{
  font-size:15px;
  font-weight:700;
  margin-bottom:3px;
  padding-right:46px;
  line-height:1.3;
}

.artist{
  font-size:11px;
  margin-bottom:7px;
}

.line{
  border-top:1px dashed rgba(95,145,210,.34);
  margin:6px 0;
}

.source{
  font-size:10px;
  line-height:1.6;
  color:#6f9ed8;
  margin-bottom:8px;
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  justify-content:flex-start;
  align-items:center;
}

.badge{
  border:1px solid rgba(143,184,232,.65);
  background:rgba(255,255,255,.42);
  color:#5f91d2;
  padding:1px 6px;
  min-width:50px;
  text-align:center;
  font-size:9px;
  line-height:1.5;
}

.new{
  position:absolute;
  top:10px;
  right:10px;
  border:1px solid #8fb8e8;
  background:rgba(255,255,255,.75);
  padding:2px 8px;
  font-size:9px;
  letter-spacing:.12em;
}

.empty{
  text-align:center;
  font-size:13px;
  padding:28px 8px;
  color:#7aa7dc;
}

.footer{
  text-align:center;
  margin:24px 0 8px;
  font-size:12px;
  color:#7aa7dc;
}

.top-btn{
  position:fixed;
  right:18px;
  bottom:22px;
  width:42px;
  height:42px;
  background:rgba(255,255,255,.85);
  border:1px solid #8fb8e8;
  outline:1px solid rgba(143,184,232,.4);
  outline-offset:2px;
  color:#6f95d8;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  transition:.2s;
}

.top-btn:hover{
  background:white;
}

@media(min-width:640px){
  body{
    padding:24px;
  }

  .categories{
    grid-template-columns:repeat(4,1fr);
  }

  h1{
    font-size:34px;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <section class="frame header">
    <h1>Krul Repertoire</h1>
    <div class="sub">歌える曲一覧</div>
    <div class="count">⟡ <span id="songCount">0</span> Songs ⟡</div>
    <div class="message">
      歌唱実習大好きな候補生です🤍<br>
      是非参考にしてくださいっ！
    </div>
  </section>

  <div class="search-area">
    <input
      id="searchInput"
      class="search"
      type="text"
      placeholder="曲名・アーティスト・作品で検索">

    <button
      id="clearSearchBtn"
      class="clear-btn"
      type="button">
      ×
    </button>
  </div>

  <button
    id="randomBtn"
    class="random-btn"
    type="button">
    ✧ Pick a Song ✧
  </button>

  <div id="todaySong"></div>

  <div class="categories" id="categoryButtons"></div>

  <div class="tag-filters" id="tagButtons">
    <div class="tag-filter active" data-tag="全て">全て</div>
    <div class="tag-filter" data-tag="デュエット">デュエット</div>
    <div class="tag-filter" data-tag="ハモリ">ハモリ</div>
    <div class="tag-filter" data-tag="十八番">十八番</div>
  </div>

  <div id="songList"></div>

  <div class="footer" id="lastUpdate">
    ✧ Last Update ✧
  </div>

</div>

<button id="topBtn" class="top-btn">▲</button>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ444xhyCcfqrCQePNQS_DhjMc-wLoXzTWUYyB7I4Q1-bIzbTgTDtkf8ZKbFyiwtiruFQ1uhXX8lwcG/pub?gid=0&single=true&output=csv";

let allSongs = [];
let currentCategory = "全曲";
let currentTag = "全て";

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for(let i = 0; i < text.length; i++){
    const char = text[i];
    const next = text[i + 1];

    if(char === '"' && inQuotes && next === '"'){
      cell += '"';
      i++;
    }else if(char === '"'){
      inQuotes = !inQuotes;
    }else if(char === "," && !inQuotes){
      row.push(cell);
      cell = "";
    }else if((char === "\n" || char === "\r") && !inQuotes){
      if(cell || row.length){
        row.push(cell);
        rows.push(row);
        row = [];
        cell = "";
      }
      if(char === "\r" && next === "\n"){
        i++;
      }
    }else{
      cell += char;
    }
  }

  if(cell || row.length){
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function isYes(value){
  const v = String(value || "").trim();
  return ["あり","有","○","◯","TRUE","true","1","yes","Yes"].includes(v);
}

function isNew(dateText){
  if(!dateText){
    return false;
  }

  const date = new Date(String(dateText).replace(/\./g,"/").replace(/-/g,"/"));

  if(isNaN(date)){
    return false;
  }

  const today = new Date();
  const diff = (today - date) / (1000 * 60 * 60 * 24);

  return diff <= 30;
}

function makeCard(song){
  const badges = [];

  if(song.category){
    badges.push(song.category);
  }

  if(isYes(song.duet)){
    badges.push("デュエット");
  }

  if(isYes(song.harmony)){
    badges.push("ハモリ");
  }

  if(isYes(song.favorite)){
    badges.push("十八番");
  }

  return `
    <section class="song-card">
      ${isNew(song.date) ? `<div class="new">✧ NEW ✧</div>` : ""}
      <div class="song-title">♪ ${song.title}</div>
      <div class="artist">${song.artist || ""}</div>
      <div class="line"></div>
      <div class="source">作品・出典　${song.source || "-"}</div>
      <div class="badges">
        ${badges.map(b => `<span class="badge">${b}</span>`).join("")}
      </div>
    </section>
  `;
}

function renderCategoryButtons(){
  const categoryOrder = [
    "全曲",
    "アニメ",
    "ゲーム",
    "声優",
    "女性アイドル",
    "男性アイドル",
    "VTuber",
    "ボカロ",
    "J-POP",
    "昭和歌謡",
    "洋楽"
  ];

  const existingCategories = [
    ...new Set(
      allSongs
        .map(song => song.category)
        .filter(Boolean)
    )
  ];

  const categories = [
    ...categoryOrder.filter(category =>
      category === "全曲" || existingCategories.includes(category)
    ),
    ...existingCategories.filter(category =>
      !categoryOrder.includes(category)
    )
  ];

  const container = document.getElementById("categoryButtons");

  container.innerHTML = categories.map(category => `
    <div class="cat ${category === currentCategory ? "active" : ""}" data-category="${category}">
      ${category}
    </div>
  `).join("");

  container.querySelectorAll(".cat").forEach(button => {
    button.addEventListener("click", () => {
      container.querySelectorAll(".cat").forEach(b => b.classList.remove("active"));
      button.classList.add("active");
      currentCategory = button.dataset.category;
      renderSongs();
    });
  });
}

function getFilteredSongs(){
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

  return allSongs.filter(song => {
    const matchCategory =
      currentCategory === "全曲" || song.category === currentCategory;

    const text = [
      song.title,
      song.artist,
      song.source,
      song.category
    ].join(" ").toLowerCase();

    const matchKeyword = text.includes(keyword);

    const matchTag =
      currentTag === "全て" ||
      (currentTag === "デュエット" && isYes(song.duet)) ||
      (currentTag === "ハモリ" && isYes(song.harmony)) ||
      (currentTag === "十八番" && isYes(song.favorite));

    return matchCategory && matchKeyword && matchTag;
  });
}

function renderSongs(){
  const filtered = getFilteredSongs();

  document.getElementById("songCount").textContent = filtered.length;

  document.getElementById("songList").innerHTML =
    filtered.length
      ? filtered.map(makeCard).join("")
      : `<div class="empty">該当する曲がありません</div>`;
}

function sortSongs(){
  allSongs.sort((a,b) => {
    const aNew = isNew(a.date) ? 1 : 0;
    const bNew = isNew(b.date) ? 1 : 0;

    if(aNew !== bNew){
      return bNew - aNew;
    }

    const artistCompare =
      (a.artist || "").localeCompare(
        (b.artist || ""),
        "ja"
      );

    if(artistCompare !== 0){
      return artistCompare;
    }

    return (a.title || "").localeCompare(
      (b.title || ""),
      "ja"
    );
  });
}

async function loadSongs(){
  try{
    const response = await fetch(CSV_URL);
    const text = await response.text();
    const rows = parseCSV(text).filter(row =>
      row.some(cell => cell.trim() !== "")
    );

    rows.shift();

    allSongs = rows.map(row => ({
      title: row[0]?.trim() || "",
      artist: row[1]?.trim() || "",
      source: row[2]?.trim() || "",
      category: row[3]?.trim() || "",
      duet: row[4]?.trim() || "",
      harmony: row[5]?.trim() || "",
      favorite: row[6]?.trim() || "",
      date: row[7]?.trim() || ""
    })).filter(song => song.title);

    sortSongs();

    const dates = allSongs.map(song => song.date).filter(Boolean);

    if(dates.length){
      document.getElementById("lastUpdate").textContent =
        `✧ Last Update　${dates[dates.length - 1]} ✧`;
    }

    renderCategoryButtons();
    renderSongs();

  }catch(error){
    document.getElementById("songList").innerHTML =
      `<div class="empty">曲リストを読み込めませんでした</div>`;
  }
}

document.getElementById("searchInput").addEventListener("input", renderSongs);

document.getElementById("clearSearchBtn").addEventListener("click", () => {
  const searchInput = document.getElementById("searchInput");
  searchInput.value = "";
  renderSongs();
});

document.getElementById("randomBtn").addEventListener("click", () => {
  if(allSongs.length === 0){
    return;
  }

  const randomSong =
    allSongs[Math.floor(Math.random() * allSongs.length)];

  document.getElementById("todaySong").innerHTML = `
    <div class="today-title">
      ✧ Today's Song ✧
    </div>

    ${makeCard(randomSong)}
  `;

  document.getElementById("todaySong").scrollIntoView({
    behavior:"smooth",
    block:"center"
  });
});

document.querySelectorAll(".tag-filter").forEach(button => {
  button.addEventListener("click", () => {
    document.querySelectorAll(".tag-filter").forEach(b => b.classList.remove("active"));
    button.classList.add("active");
    currentTag = button.dataset.tag;
    renderSongs();
  });
});

document.getElementById("topBtn").addEventListener("click", () => {
  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
});

loadSongs();
</script>

</body>
</html>
