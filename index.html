<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kururu Repertoire</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@500;700&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

html{
  min-height:100%;
  background:#e8f7ff;
}

body{
  margin:0;
  min-height:100vh;
  padding:16px;
  background:#e8f7ff;
  font-family:"Zen Old Mincho", serif;
  color:#5f91d2;
}

.wrap{
  max-width:820px;
  margin:0 auto;
}

.frame{
  background:rgba(255,255,255,.80);
  border:1px solid #8fb8e8;
  outline:1px solid rgba(143,184,232,.45);
  outline-offset:4px;
}

.header{
  text-align:center;
  padding:24px 14px 22px;
  margin:12px 4px 22px;
}

.moon{
  font-size:24px;
  margin-bottom:6px;
}

h1{
  margin:0;
  font-size:27px;
  font-weight:700;
  letter-spacing:.04em;
}

.sub{
  margin-top:5px;
  font-size:14px;
  letter-spacing:.12em;
}

.count{
  margin-top:10px;
  font-size:13px;
  color:#7aa7dc;
}

.message{
  margin-top:14px;
  line-height:1.7;
  font-size:13px;
}

.search{
  width:100%;
  padding:11px 13px;
  margin:4px 0 16px;
  border:1px solid #9fc2ed;
  background:rgba(255,255,255,.70);
  color:#5f91d2;
  font-family:inherit;
  font-size:13px;
  border-radius:0;
}

.search::placeholder{
  color:#94b7e4;
}

.categories{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-bottom:20px;
}

.cat{
  border:1px solid #9fc2ed;
  background:rgba(255,255,255,.48);
  color:#5f91d2;
  padding:8px 5px;
  text-align:center;
  font-size:13px;
  cursor:pointer;
}

.cat.active{
  background:rgba(143,184,232,.22);
}

.song-card{
  position:relative;
  background:rgba(255,255,255,.80);
  border:1px solid #8fb8e8;
  outline:1px solid rgba(143,184,232,.35);
  outline-offset:3px;
  padding:10px 12px;
  margin:0 4px 13px;
}

.song-title{
  font-size:15px;
  font-weight:700;
  margin-bottom:3px;
  padding-right:46px;
  line-height:1.3;
}

.artist{
  font-size:13px;
  margin-bottom:7px;
}

.line{
  border-top:1px dashed rgba(95,145,210,.34);
  margin:7px 0;
}

.source{
  font-size:12px;
  line-height:1.6;
  color:#6f9ed8;
  margin-bottom:8px;
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  justify-content:flex-start;
  align-items:center;
}

.badge{
  border:1px solid rgba(143,184,232,.65);
  background:rgba(255,255,255,.42);
  color:#5f91d2;
  padding:2px 8px;
  min-width:50px;
  text-align:center;
  font-size:10px;
  line-height:1.5;
}

.new{
  position:absolute;
  top:10px;
  right:10px;
  border:1px solid #8fb8e8;
  background:rgba(255,255,255,.58);
  padding:2px 7px;
  font-size:10px;
  letter-spacing:.08em;
}

.empty{
  text-align:center;
  font-size:13px;
  padding:28px 8px;
  color:#7aa7dc;
}

.footer{
  text-align:center;
  margin:24px 0 8px;
  font-size:12px;
  color:#7aa7dc;
}

@media(min-width:640px){
  body{ padding:24px; }
  .categories{ grid-template-columns:repeat(4,1fr); }
  h1{ font-size:34px; }
}
</style>
</head>

<body>
<div class="wrap">

  <section class="frame header">
    <div class="moon">☾</div>
    <h1>Kururu Repertoire</h1>
    <div class="sub">歌える曲一覧</div>
    <div class="count">現在 <span id="songCount">0</span> 曲</div>
    <div class="message">
      歌唱実習大好きな候補生です🤍<br>
      是非参考にしてくださいっ！
    </div>
  </section>

  <input id="searchInput" class="search" type="text" placeholder="曲名・アーティストで検索">

  <div class="categories" id="categoryButtons"></div>

  <div id="songList"></div>

  <div class="footer" id="lastUpdate">
    ✧ Last Update ✧
  </div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ444xhyCcfqrCQePNQS_DhjMc-wLoXzTWUYyB7I4Q1-bIzbTgTDtkf8ZKbFyiwtiruFQ1uhXX8lwcG/pub?gid=0&single=true&output=csv";

let allSongs = [];
let currentCategory = "全曲";

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for(let i = 0; i < text.length; i++){
    const char = text[i];
    const next = text[i + 1];

    if(char === '"' && inQuotes && next === '"'){
      cell += '"';
      i++;
    }else if(char === '"'){
      inQuotes = !inQuotes;
    }else if(char === "," && !inQuotes){
      row.push(cell);
      cell = "";
    }else if((char === "\n" || char === "\r") && !inQuotes){
      if(cell || row.length){
        row.push(cell);
        rows.push(row);
        row = [];
        cell = "";
      }
      if(char === "\r" && next === "\n") i++;
    }else{
      cell += char;
    }
  }

  if(cell || row.length){
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function isYes(value){
  const v = String(value || "").trim();
  return ["あり","有","○","◯","TRUE","true","1","yes","Yes"].includes(v);
}

function isNew(dateText){
  if(!dateText) return false;

  const date = new Date(String(dateText).replace(/\./g,"/").replace(/-/g,"/"));
  if(isNaN(date)) return false;

  const today = new Date();
  const diff = (today - date) / (1000 * 60 * 60 * 24);

  return diff <= 30;
}

function formatLastUpdate(dateText){
  return dateText || "";
}

function makeCard(song){
  const badges = [];

  if(song.category) badges.push(song.category);
  if(isYes(song.duet)) badges.push("デュエット");
  if(isYes(song.harmony)) badges.push("ハモリ");

  return `
    <section class="song-card">
      ${isNew(song.date) ? `<div class="new">NEW</div>` : ""}
      <div class="song-title">♪ ${song.title}</div>
      <div class="artist">${song.artist || ""}</div>
      <div class="line"></div>
      <div class="source">作品・出典　${song.source || "-"}</div>
      <div class="badges">
        ${badges.map(b => `<span class="badge">${b}</span>`).join("")}
      </div>
    </section>
  `;
}

function renderCategoryButtons(){
  const categories = [
    "全曲",
    ...new Set(
      allSongs
        .map(song => song.category)
        .filter(Boolean)
    )
  ];

  const container = document.getElementById("categoryButtons");

  container.innerHTML = categories.map(category => `
    <div class="cat ${category === currentCategory ? "active" : ""}" data-category="${category}">
      ${category}
    </div>
  `).join("");

  container.querySelectorAll(".cat").forEach(button => {
    button.addEventListener("click", () => {
      container.querySelectorAll(".cat").forEach(b => b.classList.remove("active"));
      button.classList.add("active");
      currentCategory = button.dataset.category;
      renderSongs();
    });
  });
}

function renderSongs(){
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

  const filtered = allSongs.filter(song => {
    const matchCategory =
      currentCategory === "全曲" || song.category === currentCategory;

    const text = [
      song.title,
      song.artist,
      song.source,
      song.category
    ].join(" ").toLowerCase();

    const matchKeyword = text.includes(keyword);

    return matchCategory && matchKeyword;
  });

  document.getElementById("songCount").textContent = filtered.length;

  document.getElementById("songList").innerHTML =
    filtered.length
      ? filtered.map(makeCard).join("")
      : `<div class="empty">該当する曲がありません</div>`;
}

async function loadSongs(){
  const response = await fetch(CSV_URL);
  const text = await response.text();
  const rows = parseCSV(text).filter(row => row.some(cell => cell.trim() !== ""));

  rows.shift();

  allSongs = rows.map(row => ({
    title: row[0]?.trim() || "",
    artist: row[1]?.trim() || "",
    source: row[2]?.trim() || "",
    category: row[3]?.trim() || "",
    duet: row[4]?.trim() || "",
    harmony: row[5]?.trim() || "",
    date: row[6]?.trim() || ""
  })).filter(song => song.title);

  allSongs.sort((a,b) =>
    a.title.localeCompare(b.title, "ja")
  );

  const dates = allSongs.map(s => s.date).filter(Boolean);
  if(dates.length){
    document.getElementById("lastUpdate").textContent =
      `✧ Last Update　${formatLastUpdate(dates[dates.length - 1])} ✧`;
  }

  renderCategoryButtons();
  renderSongs();
}

document.getElementById("searchInput").addEventListener("input", renderSongs);

loadSongs();
</script>

</body>
</html>
