<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kururu Repertoire</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@500;700&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  padding:20px;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.9), transparent 28%),
    linear-gradient(180deg,#eaf8ff 0%,#f8fdff 100%);
  font-family:"Zen Old Mincho", serif;
  color:#5f91d2;
}

.wrap{
  max-width:760px;
  margin:0 auto;
}

.frame{
  background:rgba(255,255,255,.62);
  border:1px solid #8fb8e8;
  outline:1px solid rgba(143,184,232,.55);
  outline-offset:5px;
  margin:16px 4px 28px;
}

.header{
  text-align:center;
  padding:34px 16px 30px;
}

.moon{
  font-size:28px;
  margin-bottom:8px;
}

h1{
  margin:0;
  font-size:30px;
  font-weight:700;
  letter-spacing:.04em;
}

.sub{
  margin-top:7px;
  font-size:16px;
  letter-spacing:.12em;
}

.count{
  margin-top:14px;
  font-size:14px;
  color:#7aa7dc;
}

.message{
  margin-top:20px;
  line-height:1.8;
  font-size:15px;
}

.search{
  width:100%;
  padding:14px 16px;
  margin:6px 0 20px;
  border:1px solid #9fc2ed;
  background:rgba(255,255,255,.65);
  color:#5f91d2;
  font-family:inherit;
  font-size:15px;
  border-radius:0;
}

.search::placeholder{
  color:#94b7e4;
}

.categories{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:24px;
}

.cat{
  border:1px solid #9fc2ed;
  background:rgba(255,255,255,.56);
  color:#5f91d2;
  padding:10px 6px;
  text-align:center;
  font-size:14px;
}

.song-card{
  position:relative;
  background:rgba(255,255,255,.62);
  border:1px solid #8fb8e8;
  outline:1px solid rgba(143,184,232,.45);
  outline-offset:4px;
  padding:18px 16px;
  margin:0 4px 18px;
}

.song-title{
  font-size:22px;
  font-weight:700;
  margin-bottom:6px;
  padding-right:48px;
}

.artist{
  font-size:16px;
  margin-bottom:10px;
}

.line{
  border-top:1px dashed rgba(95,145,210,.4);
  margin:10px 0;
}

.meta{
  font-size:14px;
  line-height:1.9;
  color:#6f9ed8;
}

.meta-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px 14px;
  margin-top:8px;
}

.tag{
  display:inline-block;
  min-width:72px;
  border:1px solid rgba(143,184,232,.55);
  background:rgba(255,255,255,.48);
  padding:2px 7px;
  margin-right:5px;
  text-align:center;
}

.new{
  position:absolute;
  top:14px;
  right:14px;
  border:1px solid #8fb8e8;
  background:rgba(255,255,255,.68);
  padding:3px 8px;
  font-size:12px;
  letter-spacing:.08em;
}

.footer{
  text-align:center;
  margin:30px 0 10px;
  font-size:14px;
  color:#7aa7dc;
}

@media(min-width:640px){
  .categories{
    grid-template-columns:repeat(4,1fr);
  }

  h1{
    font-size:36px;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <section class="frame header">
    <div class="moon">☾</div>
    <h1>Kururu Repertoire</h1>
    <div class="sub">歌える曲一覧</div>
    <div class="count">現在 <span id="songCount">0</span> 曲</div>
    <div class="message">
      歌唱実習大好きな候補生です🤍<br>
      是非参考にしてくださいっ！
    </div>
  </section>

  <input class="search" type="text" placeholder="曲名・アーティストで検索">

  <div class="categories">
    <div class="cat">全曲</div>
    <div class="cat">アニメ</div>
    <div class="cat">ボカロ</div>
    <div class="cat">女性アイドル</div>
    <div class="cat">男性アイドル</div>
    <div class="cat">VTuber</div>
    <div class="cat">J-POP</div>
    <div class="cat">ゲーム</div>
    <div class="cat">洋楽</div>
    <div class="cat">昭和歌謡</div>
    <div class="cat">声優</div>
  </div>

  <section class="song-card">
    <div class="new">NEW</div>
    <div class="song-title">♪ Snow halation</div>
    <div class="artist">μ's</div>
    <div class="line"></div>
    <div class="meta">
      作品・出典　ラブライブ！
      <div class="meta-row">
        <div><span class="tag">デュエット</span>なし</div>
        <div><span class="tag">ハモリ</span>あり</div>
      </div>
    </div>
  </section>

  <section class="song-card">
    <div class="new">NEW</div>
    <div class="song-title">♪ ライオン</div>
    <div class="artist">May'n・中島愛</div>
    <div class="line"></div>
    <div class="meta">
      作品・出典　マクロスF
      <div class="meta-row">
        <div><span class="tag">デュエット</span>あり</div>
        <div><span class="tag">ハモリ</span>要相手</div>
      </div>
    </div>
  </section>

  <section class="song-card">
    <div class="song-title">♪ God knows...</div>
    <div class="artist">涼宮ハルヒ</div>
    <div class="line"></div>
    <div class="meta">
      作品・出典　涼宮ハルヒの憂鬱
      <div class="meta-row">
        <div><span class="tag">デュエット</span>なし</div>
        <div><span class="tag">ハモリ</span>あり</div>
      </div>
    </div>
  </section>

  <div class="footer">
    ✧ Last Update　2026.06.02 ✧
  </div>

</div>

<script>
const songs = document.querySelectorAll(".song-card");
document.getElementById("songCount").textContent = songs.length;
</script>

</body>
</html>
