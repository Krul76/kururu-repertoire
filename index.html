<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kururu Repertoire</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@500;700&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  padding:16px;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.95), transparent 30%),
    linear-gradient(180deg,#eaf8ff 0%,#f8fdff 100%);
  font-family:"Zen Old Mincho", serif;
  color:#5f91d2;
}

.wrap{
  max-width:820px;
  margin:0 auto;
}

.frame{
  background:rgba(255,255,255,.58);
  border:1px solid #8fb8e8;
  outline:1px solid rgba(143,184,232,.45);
  outline-offset:4px;
}

.header{
  text-align:center;
  padding:24px 14px 22px;
  margin:12px 4px 22px;
}

.moon{
  font-size:24px;
  margin-bottom:6px;
}

h1{
  margin:0;
  font-size:27px;
  font-weight:700;
  letter-spacing:.04em;
}

.sub{
  margin-top:5px;
  font-size:14px;
  letter-spacing:.12em;
}

.count{
  margin-top:10px;
  font-size:13px;
  color:#7aa7dc;
}

.message{
  margin-top:14px;
  line-height:1.7;
  font-size:13px;
}

.search{
  width:100%;
  padding:11px 13px;
  margin:4px 0 16px;
  border:1px solid #9fc2ed;
  background:rgba(255,255,255,.55);
  color:#5f91d2;
  font-family:inherit;
  font-size:13px;
  border-radius:0;
}

.search::placeholder{
  color:#94b7e4;
}

.categories{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-bottom:20px;
}

.cat{
  border:1px solid #9fc2ed;
  background:rgba(255,255,255,.48);
  color:#5f91d2;
  padding:8px 5px;
  text-align:center;
  font-size:13px;
}

.song-card{
  position:relative;
  background:rgba(255,255,255,.55);
  border:1px solid #8fb8e8;
  outline:1px solid rgba(143,184,232,.35);
  outline-offset:3px;
  padding:12px 13px;
  margin:0 4px 13px;
}

.song-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:3px;
  padding-right:46px;
  line-height:1.3;
}

.artist{
  font-size:13px;
  margin-bottom:7px;
}

.line{
  border-top:1px dashed rgba(95,145,210,.34);
  margin:7px 0;
}

.source{
  font-size:12px;
  line-height:1.6;
  color:#6f9ed8;
  margin-bottom:8px;
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  justify-content:flex-start;
  align-items:center;
}

.badge{
  border:1px solid rgba(143,184,232,.65);
  background:rgba(255,255,255,.42);
  color:#5f91d2;
  padding:2px 10px;
  min-width:58px;
  text-align:center;
  font-size:11px;
  line-height:1.5;
}

.new{
  position:absolute;
  top:10px;
  right:10px;
  border:1px solid #8fb8e8;
  background:rgba(255,255,255,.58);
  padding:2px 7px;
  font-size:10px;
  letter-spacing:.08em;
}

.footer{
  text-align:center;
  margin:24px 0 8px;
  font-size:12px;
  color:#7aa7dc;
}

@media(min-width:640px){
  body{
    padding:24px;
  }

  .categories{
    grid-template-columns:repeat(4,1fr);
  }

  h1{
    font-size:34px;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <section class="frame header">
    <div class="moon">☾</div>
    <h1>Kururu Repertoire</h1>
    <div class="sub">歌える曲一覧</div>
    <div class="count">現在 <span id="songCount">0</span> 曲</div>
    <div class="message">
      歌唱実習大好きな候補生です🤍<br>
      是非参考にしてくださいっ！
    </div>
  </section>

  <input class="search" type="text" placeholder="曲名・アーティストで検索">

  <div class="categories">
    <div class="cat">全曲</div>
    <div class="cat">アニメ</div>
    <div class="cat">ボカロ</div>
    <div class="cat">女性アイドル</div>
    <div class="cat">男性アイドル</div>
    <div class="cat">VTuber</div>
    <div class="cat">J-POP</div>
    <div class="cat">ゲーム</div>
    <div class="cat">洋楽</div>
    <div class="cat">昭和歌謡</div>
    <div class="cat">声優</div>
  </div>

  <section class="song-card">
    <div class="new">NEW</div>
    <div class="song-title">♪ Snow halation</div>
    <div class="artist">μ's</div>
    <div class="line"></div>
    <div class="source">作品・出典　ラブライブ！</div>
    <div class="badges">
      <span class="badge">アニメ</span>
      <span class="badge">ハモリ</span>
    </div>
  </section>

  <section class="song-card">
    <div class="new">NEW</div>
    <div class="song-title">♪ ライオン</div>
    <div class="artist">May'n・中島愛</div>
    <div class="line"></div>
    <div class="source">作品・出典　マクロスF</div>
    <div class="badges">
      <span class="badge">アニメ</span>
      <span class="badge">デュエット</span>
      <span class="badge">ハモリ</span>
    </div>
  </section>

  <section class="song-card">
    <div class="song-title">♪ God knows...</div>
    <div class="artist">涼宮ハルヒ</div>
    <div class="line"></div>
    <div class="source">作品・出典　涼宮ハルヒの憂鬱</div>
    <div class="badges">
      <span class="badge">アニメ</span>
      <span class="badge">ハモリ</span>
    </div>
  </section>

  <div class="footer">
    ✧ Last Update　2026.06.02 ✧
  </div>

</div>

<script>
const songs = document.querySelectorAll(".song-card");
document.getElementById("songCount").textContent = songs.length;
</script>

</body>
</html>
